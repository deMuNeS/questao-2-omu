<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Espelhos</title>

<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-top: 10px;
        font-size: 22px;
        text-align: center;
    }

    #info {
        margin: 10px;
        text-align: center;
        line-height: 1.5;
    }

    canvas {
        background: black;
        border: 2px solid white;
        touch-action: none;
    }

    .controls {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
    }

    button {
        padding: 12px 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #333;
        color: white;
    }

    button:active {
        background: #555;
    }
</style>
</head>

<body>

<h1>Sala de Espelhos</h1>

<div id="info"></div>

<canvas id="canvas" width="600" height="600"></canvas>

<div class="controls">
    <button onclick="changeX(-1)">x -</button>
    <button onclick="changeX(1)">x +</button>

    <button onclick="changeY(-1)">y -</button>
    <button onclick="changeY(1)">y +</button>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

const size = 500;
const offset = 50;

const centerX = offset + size / 2;
const centerY = offset + size / 2;

let speed = 4;

let laserX, laserY;
let dx, dy;

let reflections = 0;

// FRAÇÃO EXATA
let xValue = 1;
let yValue = 2;

function gcd(a, b) {
    while (b !== 0) {
        let t = b;
        b = a % b;
        a = t;
    }
    return a;
}

function simplifyFraction() {

    const divisor = gcd(xValue, yValue);

    xValue /= divisor;
    yValue /= divisor;
}

function changeX(delta) {

    xValue += delta;

    if (xValue < 1) xValue = 1;

    simplifyFraction();
    resetLaser();
}

function changeY(delta) {

    yValue += delta;

    if (yValue < 1) yValue = 1;

    simplifyFraction();
    resetLaser();
}

function resetLaser() {

    laserX = centerX;
    laserY = centerY;

    // tan(theta) = x/y
    const angle = Math.atan(xValue / yValue);

    dx = Math.cos(angle) * speed;
    dy = -Math.sin(angle) * speed;

    reflections = 0;
}

resetLaser();

function update() {

    laserX += dx;
    laserY += dy;

    let hitVertical = false;
    let hitHorizontal = false;

    if (laserX <= offset) {
        laserX = offset;
        dx *= -1;
        hitVertical = true;
    }

    if (laserX >= offset + size) {
        laserX = offset + size;
        dx *= -1;
        hitVertical = true;
    }

    if (laserY <= offset) {
        laserY = offset;
        dy *= -1;
        hitHorizontal = true;
    }

    if (laserY >= offset + size) {
        laserY = offset + size;
        dy *= -1;
        hitHorizontal = true;
    }

    // canto = 2 reflexões
    if (hitVertical) reflections++;
    if (hitHorizontal) reflections++;
}

function draw() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;

    ctx.strokeRect(offset, offset, size, size);

    // centro
    ctx.fillStyle = "lime";

    ctx.beginPath();
    ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
    ctx.fill();

    // laser
    ctx.fillStyle = "red";

    ctx.beginPath();
    ctx.arc(laserX, laserY, 5, 0, Math.PI * 2);
    ctx.fill();

    const angleDeg =
        Math.atan(xValue / yValue) * 180 / Math.PI;

    const predictedReflections = xValue + yValue;

    info.innerHTML = `
    θ ≈ ${angleDeg.toFixed(3)}°<br>
    tan(θ) = ${xValue}/${yValue}<br>
    Previsão teórica: ${predictedReflections} reflexões<br>
    Reflexões observadas: ${reflections}<br><br>

    A previsão funciona para x/y na forma reduzida.<br>
    No vértice, contam-se duas reflexões simultâneas.
    `;
}

function loop() {

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
